name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black==26.3.1 isort ruff
      - run: black --check --line-length=120 --target-version py312 .
      - run: isort --check .
      - run: ruff check .
